apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx-app
  namespace: task-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-app
  template:
    metadata:
      labels:
        app: nginx-app
    spec:  
      containers:
      - name: nginx
        image: nginx:latest
      initContainers:
      - name: delay
        image: busybox
        command: ["sh", "-c", "until nslookup nginx-svc.task-2.svc.cluster.local 2>/dev/null; do echo waiting for dns; sleep 2; done"]
